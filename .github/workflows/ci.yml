name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - CI_STATUS.md
      - DEPLOY_STATUS.md
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: leadex_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d leadex_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: Leadex
      APP_ENV: test
      DEBUG: "false"
      SECRET_KEY: ci-only-secret-key-not-for-production
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/leadex_ci
      REDIS_URL: redis://127.0.0.1:6379/0
      HOST: 127.0.0.1
      PORT: "8000"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ORIGINS: http://localhost:8000,http://testserver
      RECAPTCHA_SECRET_KEY: test-secret
      RECAPTCHA_SITE_KEY: test-site
      EMAIL_BACKEND: sendgrid
      SENDGRID_API_KEY: test-sendgrid-key
      SENDGRID_FROM_EMAIL: ci@example.com
      META_ACCESS_TOKEN: ""
      META_PHONE_NUMBER_ID: ""
      META_BUSINESS_ACCOUNT_ID: ""
      META_VERIFY_TOKEN: ""
      WHATSIPLUS_API_KEY: ""
      GOOGLE_CREDENTIALS_FILE: /tmp/nonexistent-google-credentials.json
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ""
      GEOIP_DATABASE_PATH: /tmp/nonexistent-geoip.mmdb

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate application
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/leadex-ci.log) 2>&1

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

          echo "Checking Python syntax..."
          python -m compileall -q app

          echo "Checking for committed private keys..."
          if grep -RIl --exclude-dir=.git --exclude-dir=.github \
            -E -- '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----' . | grep -q .; then
            echo "Private key material is committed in the repository."
            exit 1
          fi

          echo "Applying migrations to the CI database..."
          alembic upgrade head

          echo "Running application health smoke test..."
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200, response.text
          assert response.json() == {'status': 'ok'}, response.json()
          print('Health endpoint passed:', response.json())
          PY

          if find tests -type f -name 'test_*.py' -print -quit | grep -q .; then
            echo "Running repository tests..."
            pytest -q tests --disable-warnings --maxfail=1
          else
            echo "No tests/test_*.py files found; smoke checks completed."
          fi

      - name: Publish CI diagnostics
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "${{ steps.validation.outcome }}" == "success" ]]; then
            if [[ -f CI_STATUS.md ]]; then
              rm CI_STATUS.md
              git add CI_STATUS.md
              git commit -m "ci: clear resolved failure report"
              git push origin HEAD:main
            fi
          else
            {
              echo "# CI failed"
              echo
              echo "Commit: \`${GITHUB_SHA}\`"
              echo
              echo '```text'
              if [[ -f /tmp/leadex-ci.log ]]; then
                tail -n 180 /tmp/leadex-ci.log
              else
                echo "CI failed before a diagnostic log was created."
              fi
              echo '```'
            } > CI_STATUS.md

            git add CI_STATUS.md
            git commit -m "ci: record validation failure" || true
            git push origin HEAD:main
          fi

      - name: Fail when validation failed
        if: steps.validation.outcome != 'success'
        shell: bash
        run: exit 1
