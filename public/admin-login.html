<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Auth | Leadex Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --brand-primary: #3b82f6;
            --bg-deep: #020617;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(at 50% 50%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .enterprise-border {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
        }
        .grid-pattern {
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        input:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.5);
            background: rgba(30, 41, 59, 0.8) !important;
        }
    </style>
</head>
<body class="text-slate-300 antialiased min-h-screen flex items-center justify-center p-6 grid-pattern">

    <div class="max-w-md w-full">
        <div class="text-center mb-10 space-y-4">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl shadow-xl shadow-blue-500/20 mb-2">
                <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">Security Gate</h1>
            <p class="text-xs text-slate-500 uppercase tracking-[0.2em] mono">Restricted Admin Access Only</p>
        </div>

        <div class="enterprise-border rounded-2xl p-8 lg:p-10 shadow-2xl">
            <div id="errorMsg" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-xs mono leading-relaxed"></div>
            <div id="successMsg" class="hidden mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-lg text-emerald-400 text-xs mono"></div>

            <form id="loginForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500 ml-1">Admin Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600"></i>
                        <input type="email" id="email" required placeholder="admin@leadex.io" 
                            class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-700 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase tracking-widest font-bold text-slate-500 ml-1">Keyphrase</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-600"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder:text-slate-700 transition-all">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2 group">
                    Initialize Session
                    <i data-lucide="key" class="w-4 h-4 opacity-50 group-hover:rotate-12 transition-transform"></i>
                </button>
            </form>
        </div>

        <p class="mt-8 text-center text-[10px] text-slate-600 mono uppercase tracking-widest">
            Protocol: HTTPS/TLS 1.3 • IP Logged
        </p>
    </div>

    <script>
        lucide.createIcons();

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> AUTHENTICATING...';
            lucide.createIcons();

            try {
                const response = await fetch('/api/admin/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('admin_token', data.access_token);
                    localStorage.setItem('admin_email', data.email);
                    localStorage.setItem('admin_role', data.role);
                    
                    successDiv.textContent = 'SESSION INITIALIZED. REDIRECTING...';
                    successDiv.classList.remove('hidden');
                    
                    setTimeout(() => window.location.href = '/admin-dashboard.html', 1000);
                } else {
                    errorDiv.textContent = `CRITICAL: ${data.detail?.toUpperCase() || 'ACCESS DENIED'}`;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'NETWORK ERROR: CONTROL PLANE UNREACHABLE';
                errorDiv.classList.remove('hidden');
            } finally {
                if (submitBtn.disabled) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Initialize Session <i data-lucide="key" class="w-4 h-4"></i>';
                    lucide.createIcons();
                }
            }
        });
    </script>
</body>
</html>
