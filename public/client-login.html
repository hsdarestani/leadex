<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadex Enterprise - Secure Access</title>
    <!-- Inter font for professional look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-deep: #0f172a;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 64, 175, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-logo h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .brand-logo span {
            color: var(--primary);
        }

        .login-container {
            background: var(--surface);
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
            text-align: center;
            line-height: 1.5;
        }

        .info-box {
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 28px;
            font-size: 13px;
            color: #475569;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 20px;
            display: none;
            text-align: center;
            border: 1px solid #fee2e2;
        }

        .footer-text {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand-logo">
            <h1>LEADEX<span>.</span></h1>
        </div>
        
        <div class="login-container">
            <h2>Client Access</h2>
            <p class="subtitle">Securely manage your data and leads.</p>
            
            <div class="info-box">
                Use your unique identifier to synchronize your portal session.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="token">Access Token</label>
                    <input type="text" id="token" name="token" required placeholder="e.g. LX-882-XXXX">
                </div>
                
                <div class="form-group">
                    <label for="password">Security Password <span style="font-weight: 400; color: #94a3b8;">(Optional)</span></label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>
                
                <button type="submit" id="loginBtn">Authorize Session</button>
                
                <div class="error" id="errorMsg"></div>
            </form>
        </div>
        
        <p class="footer-text">&copy; 2024 Leadex Technologies. All rights reserved.</p>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        const token = localStorage.getItem('client_token');
        if (token) {
            window.location.href = '/client-portal.html';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const accessToken = document.getElementById('token').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Verifying...';
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/api/client/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: accessToken,
                        password: password || null
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('client_token', data.access_token);
                    localStorage.setItem('client_name', data.client_name);
                    localStorage.setItem('client_id', data.client_id);
                    window.location.href = '/client-portal.html';
                } else {
                    const error = await response.json();
                    errorMsg.textContent = error.detail || 'Access denied. Please check credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Infrastructure connection failed.';
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Authorize Session';
            }
        });
    </script>
</body>
</html>
